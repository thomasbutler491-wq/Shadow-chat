<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowChat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col font-sans">
    <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-900 sticky top-0">
        <h1 class="text-xl font-bold text-indigo-400">SHADOW_CHAT</h1>
        <button onclick="socket.emit('burn-all')" class="text-xs bg-red-900/20 text-red-400 px-3 py-1 rounded border border-red-800 hover:bg-red-600 hover:text-white transition">BURN HISTORY</button>
    </div>
    <div id="chat" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
    <form id="form" class="p-4 bg-gray-800 border-t border-gray-700 flex gap-2">
        <input id="user" type="text" placeholder="User" class="w-20 p-2 rounded bg-gray-900 border border-gray-700 outline-none focus:border-indigo-500 text-sm">
        <input id="input" autocomplete="off" placeholder="Message..." class="flex-1 p-2 rounded bg-gray-900 border border-gray-700 outline-none focus:border-indigo-500 text-sm">
        <button class="bg-indigo-600 px-5 py-2 rounded font-bold hover:bg-indigo-500 transition text-sm">SEND</button>
    </form>
    <script>
        const socket = io();
        const chat = document.getElementById('chat');
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const user = document.getElementById('user');

        const renderMessage = (data) => {
            const div = document.createElement('div');
            div.className = "border-l-2 border-indigo-500 pl-3 py-1";
            div.innerHTML = `<div class="flex flex-col"><span class="text-[10px] text-indigo-400 font-mono uppercase">${data.user} • ${data.time}</span><span class="text-sm text-gray-200">${data.text}</span></div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        };

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value) {
                socket.emit('message', { user: user.value || 'Anon', text: input.value });
                input.value = '';
            }
        });

        socket.on('message', renderMessage);
        socket.on('init', (history) => history.forEach(renderMessage));
        socket.on('cleared', () => { chat.innerHTML = ''; });
    </script>
</body>
</html>
